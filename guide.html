<meta charset="utf-8">
<title>寶傑淨化科技 · 功能 Demo 導覽</title>
<style>
  :root{
    --nav:#1f3c66; --pri:#2f5fb0; --pri-d:#27408b; --ink:#1f2733; --mut:#6b7686;
    --line:#e4e8ef; --bg:#f4f6fa; --ok:#2e9e5b; --okbg:#e7f6ed; --warn:#b9821f;
    --warnbg:#fbf1d9; --dang:#d9534f; --dangbg:#fae9e8; --blue-bg:#e9f1fb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);background:#eef1f6}
  a{color:var(--pri)}
  header.top{background:var(--nav);color:#fff;padding:14px 20px}
  header.top h1{margin:0;font-size:18px;font-weight:600}
  header.top p{margin:4px 0 0;font-size:12.5px;opacity:.8}
  .wrap{display:flex;min-height:calc(100vh - 56px)}
  nav.side{width:248px;flex:none;background:#fff;border-right:1px solid var(--line);overflow:auto;height:calc(100vh - 56px);position:sticky;top:0}
  nav.side .grp{font-size:11.5px;letter-spacing:.05em;color:var(--mut);padding:14px 16px 6px;font-weight:600}
  nav.side a{display:block;padding:7px 16px 7px 20px;font-size:13.5px;color:#36414f;text-decoration:none;border-left:3px solid transparent;cursor:pointer}
  nav.side a:hover{background:#f3f6fb}
  nav.side a.on{background:var(--blue-bg);border-left-color:var(--pri);color:var(--pri-d);font-weight:600}
  main{flex:1;padding:22px 26px;overflow:auto;height:calc(100vh - 56px)}
  .cols{display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap}
  .stage{flex:none}
  .info{flex:1;min-width:320px;max-width:620px}
  .info h2{margin:0 0 2px;font-size:19px}
  .info .route{font-size:12px;color:var(--mut);font-family:ui-monospace,Menlo,monospace;margin-bottom:14px}
  .info h3{font-size:13px;margin:16px 0 6px;color:var(--pri-d);border-bottom:1px solid var(--line);padding-bottom:4px}
  .info ul{margin:6px 0;padding-left:18px}
  .info li{font-size:13.5px;line-height:1.7;margin:3px 0}
  .tag{display:inline-block;font-size:11px;background:#eef2f8;color:#445;border-radius:5px;padding:1px 7px;margin-left:6px}
  .gwt{background:#f7faf8;border:1px solid #d8ecdf;border-radius:8px;padding:8px 12px;font-size:13px;line-height:1.7;margin:4px 0}
  .gwt b{color:var(--ok)}
  code{background:#eef1f6;border-radius:4px;padding:1px 5px;font-size:12.5px}
  /* device frames */
  .phone{width:340px;border:9px solid #11151c;border-radius:34px;overflow:hidden;background:#fff;box-shadow:0 10px 30px rgba(20,30,50,.18)}
  .browser{width:560px;border:1px solid #cdd4df;border-radius:10px;overflow:hidden;background:#fff;box-shadow:0 10px 30px rgba(20,30,50,.12)}
  .browser .bbar{background:#e9edf3;padding:7px 10px;display:flex;gap:6px;align-items:center;border-bottom:1px solid #d7dde6}
  .browser .dot{width:9px;height:9px;border-radius:50%;background:#c3cad6}
  .browser .url{flex:1;background:#fff;border-radius:6px;font-size:11px;color:#5a6676;padding:3px 9px;margin-left:6px;font-family:ui-monospace,monospace}
  .scr{height:580px;overflow:auto;background:var(--bg);font-size:13px}
  .browser .scr{height:520px}
  /* app bits */
  .ab{background:var(--nav);color:#fff;padding:12px 14px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
  .ab .bell{opacity:.9;font-size:15px}
  .hdr2{background:var(--nav);color:#fff;padding:0 14px 14px}
  .hdr2 .h{font-size:18px;font-weight:700}
  .hdr2 .s{font-size:11.5px;opacity:.82;margin-top:2px}
  .pad{padding:12px 13px}
  .sect{font-weight:700;font-size:13px;margin:14px 13px 7px;color:#2a3340}
  .card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin:9px 13px}
  .card.flat{margin:9px 0}
  .muted{color:var(--mut)}
  .small{font-size:11.5px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #eef1f5}
  .row:last-child{border-bottom:none}
  .badge{font-size:10.5px;border-radius:5px;padding:1px 7px;font-weight:600;white-space:nowrap}
  .b-ok{background:var(--okbg);color:var(--ok)} .b-warn{background:var(--warnbg);color:var(--warn)}
  .b-blue{background:var(--blue-bg);color:var(--pri-d)} .b-dang{background:var(--dangbg);color:var(--dang)}
  .b-gray{background:#eceff3;color:#5d6676}
  .btn{display:block;text-align:center;background:var(--pri);color:#fff;border-radius:9px;padding:11px;font-weight:600;font-size:13.5px;margin:10px 13px}
  .btn.sec{background:#fff;color:var(--pri);border:1px solid #cfe0f3}
  .btn.dang{background:#fff;color:var(--dang);border:1px solid #f0cfce}
  .btn.green{background:var(--ok)}
  .btn.sm{display:inline-block;margin:0;padding:5px 12px;font-size:12px;border-radius:7px}
  .kpis{display:flex;gap:8px;padding:11px 13px}
  .kpi{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px;text-align:center}
  .kpi .n{font-size:20px;font-weight:700;color:var(--pri-d)} .kpi .l{font-size:10.5px;color:var(--mut)}
  .tabs{display:flex;gap:6px;padding:10px 13px;flex-wrap:wrap}
  .pill{font-size:11.5px;border:1px solid #d6deea;border-radius:16px;padding:4px 11px;color:#4a5666}
  .pill.on{background:var(--pri);color:#fff;border-color:var(--pri)}
  .tabbar{position:sticky;bottom:0;display:flex;background:#fff;border-top:1px solid var(--line)}
  .tabbar div{flex:1;text-align:center;font-size:10.5px;color:#7b8493;padding:8px 0}
  .tabbar div.on{color:var(--pri)} .tabbar .i{font-size:17px;display:block}
  .field{margin:10px 13px}
  .field label{font-size:12px;color:#56606e;display:block;margin-bottom:4px}
  .ipt{background:#fff;border:1px solid #d6deea;border-radius:8px;padding:9px 10px;font-size:13px;color:#8b96a5}
  .seg{display:flex;gap:7px}.seg .o{flex:1;text-align:center;border:1px solid #d6deea;border-radius:8px;padding:8px;font-size:12.5px;color:#55606f}
  .seg .o.on{background:var(--pri);color:#fff;border-color:var(--pri)}
  .stepper{display:flex;align-items:center;gap:10px}.stepper b{min-width:14px;text-align:center}
  .sbtn{width:24px;height:24px;border-radius:50%;background:var(--pri);color:#fff;text-align:center;line-height:24px;font-size:14px}
  .sbtn.off{background:#e6eaf0;color:#aeb6c2}
  .cal{padding:8px 6px}
  .calrow{display:grid;grid-template-columns:34px repeat(4,1fr);gap:4px;margin-bottom:4px}
  .calc{font-size:9.5px;text-align:center;border-radius:5px;padding:6px 2px;background:#cfead8;color:#1f6b3c}
  .calc.book{background:#dbe7fb;color:#27408b} .calc.no{background:#eef1f5;color:#aab2be}
  .calc.d{background:none;color:#8a93a0;padding-top:8px}
  .toggle{width:34px;height:20px;border-radius:11px;background:var(--ok);position:relative;flex:none}
  .toggle::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;right:2px}
  .toggle.off{background:#cfd6df}.toggle.off::after{right:auto;left:2px}
  .note{font-size:11px;color:var(--mut);margin:7px 13px;line-height:1.6}
  .warnbox{background:var(--warnbg);border:1px solid #ecd9a8;color:#8a6414;border-radius:9px;padding:9px 11px;margin:10px 13px;font-size:11.5px;line-height:1.6}
  .redbox{background:var(--dangbg);border:1px solid #f0cfce;color:#9c3733;border-radius:9px;padding:9px 11px;margin:10px 13px;font-size:11.5px}
  .tbl{width:100%;font-size:11.5px;border-collapse:collapse}
  .tbl th{color:var(--mut);font-weight:600;text-align:left;padding:6px 4px;border-bottom:1px solid var(--line)}
  .tbl td{padding:7px 4px;border-bottom:1px solid #eef1f5}
  .stars{color:#e6a817;font-size:12px}
  .lgd{font-size:10px;color:var(--mut);padding:0 13px 6px;line-height:1.6}
  @media(max-width:560px){nav.side{display:none}}
</style>

<header class="top">
  <h1>寶傑淨化科技 · 數位系統 功能 Demo 導覽</h1>
  <p>逆向爬梳整理 · 點左側任一功能：左為畫面重現（依實際擷取內容），右為該功能的邏輯說明 · 對應線上 v1.1.0</p>
</header>

<div class="wrap">
  <nav class="side" id="side"></nav>
  <main>
    <div class="cols">
      <div class="stage" id="stage"></div>
      <div class="info" id="info"></div>
    </div>
  </main>
</div>

<script>
const G = {
  auth:"共用 / 認證", cust:"客戶 App", staff:"業務 App", admin:"行政後台"
};
const tabC = `<div class="tabbar"><div class="on"><span class="i">⌂</span>首頁</div><div><span class="i">▦</span>我的預約</div><div><span class="i">◔</span>個人</div></div>`;
const tabS = `<div class="tabbar"><div class="on"><span class="i">▤</span>派工</div><div><span class="i">▦</span>班表</div><div><span class="i">◎</span>服務區</div><div><span class="i">◔</span>個人</div></div>`;
function phone(inner){return `<div class="phone"><div class="scr">${inner}</div></div>`;}
function browser(url,inner){return `<div class="browser"><div class="bbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="url">baojay-admin-stg.vercel.app${url}</span></div><div class="scr">${inner}</div></div>`;}

const S = [
/* ============ AUTH ============ */
{g:"auth",t:"手機 OTP 登入 / 註冊",route:"/sign-in",dev:"phone",
 mock:`<div style="padding:34px 18px;text-align:center">
   <div style="width:54px;height:54px;border-radius:14px;background:var(--pri);color:#fff;font-size:24px;font-weight:700;line-height:54px;margin:0 auto">寶</div>
   <div style="font-weight:700;font-size:17px;margin-top:12px">寶傑淨化科技</div>
   <div class="muted small">手機號碼登入</div></div>
   <div class="card"><div class="field" style="margin:0 0 6px"><label>輸入手機號碼登入</label><div class="ipt">09xxxxxxxx</div></div>
   <div class="btn" style="margin:10px 0 0">登入 / 註冊</div></div>
   <div class="note" style="text-align:center">— 其他登入方式 —</div>
   <div class="card muted" style="text-align:center">Apple 登入（即將開放）</div>
   <div class="card muted" style="text-align:center">Google 登入（即將開放）</div>
   <div class="note" style="text-align:center">輸入後 → 手機驗證：6 位數驗證碼 · 測試環境 000000 · 59 秒後可重新發送</div>`,
 logic:`<h3>用途</h3><ul><li>三種角色（客戶/業務/行政）共用同一登入頁，以手機號 + 簡訊 OTP 驗證。</li></ul>
   <h3>操作流程</h3><ul><li>輸入手機 → 送「登入/註冊」→ 收 6 位數驗證碼 → 「驗證並登入」。</li><li>首次登入該手機 → 自動建立帳號。</li></ul>
   <h3>邏輯 / 規則</h3><ul><li>登入成功後依帳號角色導向對應 App；客戶若未完成新手引導 → 強制導到 <code>/onboarding</code>。</li><li>STG 測試模式不真的發簡訊，OTP 固定 <code>000000</code>。</li><li>Apple / Google 登入保留位（停用）。</li></ul>
   <h3>邊界</h3><ul><li>OTP 錯誤 → 提示驗證失敗，可「重新輸入手機號碼」。</li><li>存取非自身角色路由 → 導向 <code>/forbidden</code>。</li></ul>
   <div class="gwt"><b>Given</b> 新手機號 <b>When</b> 輸入 000000 <b>Then</b> 建立 customer 帳號並進入新手引導。</div>`},

/* ============ CUSTOMER ============ */
{g:"cust",t:"新手引導 Onboarding",route:"/onboarding",dev:"phone",
 mock:`<div class="ab">新手引導</div>
   <div style="text-align:center;padding:14px">👋<div style="font-weight:700">歡迎加入寶傑淨化</div><div class="muted small">請填寫基本資料，以便為您安排到府服務</div></div>
   <div class="sect">基本資料</div>
   <div class="field"><label>姓名 *</label><div class="ipt">例：陳小明</div></div>
   <div class="field"><label>服務地址 *</label><div class="seg" style="margin-bottom:6px"><div class="o on">選擇縣市 ▾</div><div class="o">選擇行政區 ▾</div></div><div class="ipt">例：文心路三段100號</div></div>
   <div class="sect">通知偏好</div>
   <div class="card"><div class="row"><div><b>推播通知</b><div class="muted small">App 內即時通知</div></div><div class="toggle"></div></div>
   <div class="row"><div><b>簡訊通知</b><div class="muted small">重要提醒以簡訊補發</div></div><div class="toggle"></div></div></div>
   <div class="btn">開始使用</div>
   <div class="note">其他服務資訊（寵物、嬰幼兒等）將在預約時填寫</div>`,
 logic:`<h3>用途</h3><ul><li>客戶首次登入收集到府服務必要資料，是進入 App 的門檻。</li></ul>
   <h3>輸入 / 欄位</h3><ul><li>姓名*（空白自填，不自動帶英數）。</li><li>服務地址*：縣市下拉 → 行政區「連動」下拉（依縣市變動）→ 詳細地址。</li><li>通知偏好：推播 / 簡訊（預設皆開）。</li></ul>
   <h3>邏輯 / 規則</h3><ul><li>完成前所有客戶路由都會被導回此頁。</li><li>縣市/行政區為台灣全縣市資料；行政區清單依所選縣市切換。</li></ul>
   <div class="gwt"><b>Given</b> 未填姓名或地址 <b>When</b> 按「開始使用」 <b>Then</b> 擋下；填妥後寫入客戶檔並進首頁。</div>`},

{g:"cust",t:"客戶首頁",route:"/",dev:"phone",
 mock:`<div class="ab">首頁 <span class="bell">🔔</span></div>
   <div class="pad"><div style="font-weight:700;font-size:15px">測試客戶A 您好</div><div class="muted small">歡迎使用寶傑淨化科技</div></div>
   <div class="card" style="background:var(--nav);color:#fff;border:none">
     <span class="badge" style="background:#3a5e93;color:#cfe0fb">免費 · 限新客戶一次</span>
     <div style="font-weight:700;font-size:17px;margin:8px 0 2px">首次體驗 · 免費領取</div>
     <div class="small" style="opacity:.85">專業除蟎服務，免費體驗寶傑的清潔品質</div>
     <div style="background:#274a7c;border-radius:8px;text-align:center;padding:10px;margin-top:10px;font-weight:600">立即預約</div></div>
   <div class="card"><b style="color:var(--pri-d)">我的服務紀錄 ›</b><div class="muted small">查看歷次完工服務與評分</div></div>
   <div class="note">已建立預約後，上方卡片轉為「免費體驗 · 已預約 / {日期} / 業務將準時到府服務 / 點擊查看詳情 →」</div>${tabC}`,
 logic:`<h3>用途</h3><ul><li>客戶主入口：主打「新客免費首次體驗」轉換，並提供服務紀錄入口。</li></ul>
   <h3>邏輯 / 規則</h3><ul><li>新客顯示「免費首次體驗」CTA（限一次）；已有未來預約 → 卡片切換為「已預約」狀態並可點入詳情。</li><li>底部三分頁：首頁 / 我的預約 / 個人。</li></ul>
   <div class="gwt"><b>Given</b> 已建立未來預約 <b>When</b> 開首頁 <b>Then</b> 顯示「已預約」卡並可點入。</div>`},

{g:"cust",t:"免費體驗預約 ①選時段",route:"/booking/demo",dev:"phone",
 mock:`<div class="ab">預約 Demo</div>
   <div class="pad"><b>選擇您要的時段</b><div class="muted small">免費體驗 · 一張床 + 兩個枕頭</div></div>
   <div class="lgd">▣ 可預約 　▢ 已滿</div>
   <div class="cal">
   ${[["6/22","週一"],["6/23","週二"],["6/24","週三"],["6/25","週四"]].map((d,i)=>`<div class="calrow"><div class="calc d">${d[0]}<br>${d[1]}</div>${["09-12","12-15","15-18","18-20"].map((t,j)=>`<div class="calc ${i==3&&j==1?'book':''}" style="${i==3&&j==1?'background:var(--pri);color:#fff':''}">${t}</div>`).join("")}</div>`).join("")}
   </div>
   <div class="note">已選 6月25日（週四）12:00-15:00</div>
   <div class="btn">下一步</div>${tabC}`,
 logic:`<h3>用途</h3><ul><li>新客預約免費體驗的第一步：挑日期 + 時段。</li></ul>
   <h3>邏輯 / 規則</h3><ul><li>顯示未來 7 天 × 4 個固定時段（09-12 / 12-15 / 15-18 / 18-20）。</li><li>每格狀態：可預約 / 已滿（依該時段業務班表與容量）。</li><li>未選時段時「下一步」不可按。</li></ul>
   <h3>邊界</h3><ul><li>已滿格不可選；非新客理論上不應進此免費流程。</li></ul>`},

{g:"cust",t:"免費體驗預約 ②家裡狀況",route:"/booking/demo",dev:"phone",
 mock:`<div class="ab">預約 Demo</div>
   <div class="pad"><b>家裡狀況（選填）</b><div class="muted small">讓業務員提前做好準備，提供更貼心的服務</div></div>
   <div class="card"><div class="row"><div>🐾 <b>家中有寵物</b><div class="muted small">如貓、狗等毛小孩</div></div><div class="toggle off"></div></div>
   <div class="row"><div>👶 <b>家中有嬰幼兒</b><div class="muted small">2 歲以下嬰幼兒</div></div><div class="toggle off"></div></div></div>
   <div class="field"><label>過敏或特殊備註</label><div class="ipt" style="height:60px">例：對某些清潔劑過敏、需要低噪音等…（可留空）</div></div>
   <div class="btn">下一步：確認預約</div>
   <div class="note" style="text-align:center">略過，直接確認</div>${tabC}`,
 logic:`<h3>用途</h3><ul><li>收集到府前的環境資訊（這就是新手引導裡「將在預約時填寫」的部分）。</li></ul>
   <h3>輸入 / 欄位</h3><ul><li>家中有寵物 / 家中有嬰幼兒（開關）、過敏或特殊備註（可留空）。</li></ul>
   <h3>邏輯 / 規則</h3><ul><li>全選填，可「略過直接確認」。資料寫入該筆預約，供業務參考。</li></ul>`},

{g:"cust",t:"免費體驗預約 ③確認",route:"/booking/demo-confirm",dev:"phone",
 mock:`<div class="ab">確認預約</div>
   <div class="card"><b>確認預約</b>
   <div class="row"><span class="muted">服務內容</span><b>基礎除蟎體驗</b></div>
   <div class="row"><span class="muted">包含項目</span><b>一張床 + 兩個枕頭</b></div>
   <div class="row"><span class="muted">費用</span><b style="color:var(--warn)">免費</b></div>
   <div class="row"><span class="muted">日期</span><b>6 月 25 日（週四）</b></div>
   <div class="row"><span class="muted">時段</span><b>12:00 - 15:00</b></div>
   <div class="row"><span class="muted">服務人員</span><b>系統指派</b></div>
   <div class="row"><span class="muted">服務地址</span><b>台中市西屯區…</b></div></div>

const side=document.getElementById("side");
let html="";
Object.keys(G).forEach(g=>{
  html+=`<div class="grp">${G[g]}</div>`;
  S.forEach((s,i)=>{ if(s.g===g) html+=`<a data-i="${i}">${s.t}</a>`; });
});
side.innerHTML=html;
function show(i){
  const s=S[i];
  document.getElementById("stage").innerHTML = s.dev==="browser"?browser(s.route.split(" ")[0],s.mock):phone(s.mock);
  document.getElementById("info").innerHTML = `<h2>${s.t}</h2><div class="route">${G[s.g]} · ${s.route}</div>${s.logic}`;
  document.querySelectorAll("nav.side a").forEach(a=>a.classList.toggle("on",a.dataset.i==i));
}
side.querySelectorAll("a").forEach(a=>a.onclick=()=>show(+a.dataset.i));
show(0);
</script>
