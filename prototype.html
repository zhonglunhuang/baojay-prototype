<meta charset="utf-8">
<title>寶傑淨化科技 · 可操作原型</title>
<style>
  :root{--nav:#1f3c66;--pri:#2f5fb0;--pri-d:#27408b;--ink:#1f2733;--mut:#6b7686;--line:#e4e8ef;--bg:#f4f6fa;
    --ok:#2e9e5b;--okbg:#e7f6ed;--warn:#b9821f;--warnbg:#fbf1d9;--dang:#d9534f;--dangbg:#fae9e8;--blue-bg:#e9f1fb;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;color:var(--ink);background:#e8ecf2}
  .bar{background:var(--nav);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .bar b{font-size:14px;margin-right:6px}
  .bar .sp{flex:1}
  .rbtn{background:#2c4f80;color:#cfe0fb;border:1px solid #3a5e93;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer}
  .rbtn.on{background:#fff;color:var(--pri-d);font-weight:600}
  .rbtn.ghost{background:transparent;border-color:#3a5e93;color:#aac4ea}
  .hint{font-size:11.5px;color:#9fb8db}
  .stagewrap{display:flex;justify-content:center;padding:20px 12px 40px}
  .phone{width:380px;border:10px solid #11151c;border-radius:38px;overflow:hidden;background:#fff;box-shadow:0 14px 40px rgba(20,30,50,.22)}
  .phone .scr{height:720px;overflow:auto;background:var(--bg);font-size:13.5px;position:relative;display:flex;flex-direction:column}
  .browser{width:min(940px,96vw);border:1px solid #cdd4df;border-radius:11px;overflow:hidden;background:#fff;box-shadow:0 14px 40px rgba(20,30,50,.16)}
  .browser .bbar{background:#e9edf3;padding:8px 10px;display:flex;gap:6px;align-items:center;border-bottom:1px solid #d7dde6}
  .browser .dot{width:10px;height:10px;border-radius:50%;background:#c3cad6}
  .browser .url{flex:1;background:#fff;border-radius:6px;font-size:11.5px;color:#5a6676;padding:4px 10px;margin-left:6px;font-family:ui-monospace,monospace}
  .browser .scr{height:660px;overflow:auto;background:var(--bg);font-size:13.5px}
  .body{flex:1;overflow:auto}
  .ab{background:var(--nav);color:#fff;padding:13px 15px;font-weight:600;font-size:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
  .ab .l{display:flex;align-items:center;gap:9px}.ab .bk{cursor:pointer;opacity:.9}
  .ab .rt{font-size:13px;font-weight:500;opacity:.92;cursor:pointer}
  .hdr2{background:var(--nav);color:#fff;padding:14px 15px 16px}
  .hdr2 .h{font-size:19px;font-weight:700}.hdr2 .s{font-size:12px;opacity:.82;margin-top:3px}
  .pad{padding:13px 14px}.sect{font-weight:700;font-size:13.5px;margin:15px 14px 7px;color:#2a3340}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin:10px 14px}
  .muted{color:var(--mut)}.small{font-size:12px}.cen{text-align:center}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #eef1f5}.row:last-child{border-bottom:none}
  .badge{font-size:11px;border-radius:6px;padding:2px 8px;font-weight:600;white-space:nowrap;display:inline-block}
  .b-ok{background:var(--okbg);color:var(--ok)}.b-warn{background:var(--warnbg);color:var(--warn)}.b-blue{background:var(--blue-bg);color:var(--pri-d)}
  .b-dang{background:var(--dangbg);color:var(--dang)}.b-gray{background:#eceff3;color:#5d6676}
  .btn{display:block;width:calc(100% - 28px);text-align:center;background:var(--pri);color:#fff;border:none;border-radius:10px;padding:12px;font-weight:600;font-size:14px;margin:11px 14px;cursor:pointer;font-family:inherit}
  .btn:active{transform:scale(.99)}.btn[disabled]{background:#c2ccda;cursor:not-allowed}
  .btn.sec{background:#fff;color:var(--pri);border:1px solid #cfe0f3}.btn.dang{background:#fff;color:var(--dang);border:1px solid #f0cfce}.btn.green{background:var(--ok)}
  .ibtn{display:inline-block;width:auto;margin:0;padding:6px 13px;font-size:12.5px;border-radius:8px}
  .kpis{display:flex;gap:9px;padding:12px 14px}.kpi{flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center}
  .kpi .n{font-size:21px;font-weight:700;color:var(--pri-d)}.kpi .l{font-size:11px;color:var(--mut);margin-top:1px}
  .tabs{display:flex;gap:7px;padding:11px 14px;flex-wrap:wrap}
  .pill{font-size:12px;border:1px solid #d6deea;border-radius:16px;padding:5px 12px;color:#4a5666;cursor:pointer;background:#fff}
  .pill.on{background:var(--pri);color:#fff;border-color:var(--pri)}
  .tabbar{display:flex;background:#fff;border-top:1px solid var(--line)}
  .tabbar div{flex:1;text-align:center;font-size:11px;color:#7b8493;padding:9px 0;cursor:pointer}
  .tabbar div.on{color:var(--pri)}.tabbar .i{font-size:18px;display:block;line-height:1.3}
  .field{margin:11px 14px}.field label{font-size:12.5px;color:#56606e;display:block;margin-bottom:5px}
  input.ipt,select.ipt,textarea.ipt{width:100%;background:#fff;border:1px solid #d6deea;border-radius:9px;padding:10px;font-size:13.5px;font-family:inherit;color:var(--ink)}
  textarea.ipt{height:58px;resize:none}
  .seg{display:flex;gap:7px;flex-wrap:wrap}.seg .o{flex:1;min-width:64px;text-align:center;border:1px solid #d6deea;border-radius:9px;padding:9px;font-size:12.5px;color:#55606f;cursor:pointer;background:#fff}
  .seg .o.on{background:var(--pri);color:#fff;border-color:var(--pri)}
  .stepper{display:flex;align-items:center;gap:11px}.stepper b{min-width:16px;text-align:center}
  .sbtn{width:26px;height:26px;border-radius:50%;background:var(--pri);color:#fff;text-align:center;line-height:26px;font-size:15px;cursor:pointer;user-select:none}.sbtn.off{background:#e6eaf0;color:#aeb6c2}
  .toggle{width:38px;height:22px;border-radius:12px;background:var(--ok);position:relative;flex:none;cursor:pointer}
  .toggle::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;right:2px}
  .toggle.off{background:#cfd6df}.toggle.off::after{right:auto;left:2px}
  .note{font-size:11.5px;color:var(--mut);margin:8px 14px;line-height:1.6}
  .warnbox{background:var(--warnbg);border:1px solid #ecd9a8;color:#8a6414;border-radius:10px;padding:10px 12px;margin:11px 14px;font-size:12px;line-height:1.6}
  .redbox{background:var(--dangbg);border:1px solid #f0cfce;color:#9c3733;border-radius:10px;padding:10px 12px;margin:11px 14px;font-size:12px}
  .cal{padding:9px 8px}.calrow{display:grid;grid-template-columns:40px repeat(4,1fr);gap:5px;margin-bottom:5px}
  .calc{font-size:10px;text-align:center;border-radius:6px;padding:9px 2px;cursor:pointer;user-select:none}
  .calc.ok{background:#d3ead8;color:#1f6b3c}.calc.sel{background:var(--pri);color:#fff}.calc.no{background:#eef1f5;color:#aab2be;cursor:not-allowed}
  .calc.d{background:none;color:#8a93a0;cursor:default;padding-top:9px}.calc.book{background:#dbe7fb;color:#27408b}
  .lgd{font-size:10.5px;color:var(--mut);padding:0 14px 6px}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#1f2733;color:#fff;padding:10px 18px;border-radius:22px;font-size:13px;z-index:50;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:.95}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px}
  .mtile{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer}.mtile b{font-size:13.5px}.mtile .d{font-size:11px;color:var(--mut);margin-top:2px}
  .tbl{width:100%;font-size:12px;border-collapse:collapse}.tbl th{color:var(--mut);font-weight:600;text-align:left;padding:7px 5px;border-bottom:1px solid var(--line)}
  .tbl td{padding:8px 5px;border-bottom:1px solid #eef1f5;vertical-align:top}
  .stars{color:#e6a817}.link{color:var(--pri);cursor:pointer}
  .center-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mut);gap:6px;padding:40px}
</style>

<div class="bar">
  <b>寶傑淨化科技 · 可操作原型</b>
  <button class="rbtn" id="r-cust" onclick="A.login('cust')">客戶 App</button>
  <button class="rbtn" id="r-staff" onclick="A.login('staff')">業務 App</button>
  <button class="rbtn" id="r-admin" onclick="A.login('admin')">行政後台</button>
  <span class="sp"></span>
  <span class="hint">純前端原型 · 資料存記憶體 · 三端共用同一份資料（下單後可在各端看到串連）</span>
  <button class="rbtn ghost" onclick="A.reset()">重設資料</button>
</div>
<div class="stagewrap"><div id="stage"></div></div>
<div class="toast" id="toast"></div>

<script>
const TODAY="2026-06-22";
const nf=n=>"NT$ "+Number(n).toLocaleString();
function seed(){
 return {
  payroll:{travelFee:400},
  staff:[
    {id:"s1",name:"李業務B",phone:"0900000098",rating:4.5,status:"online",areas:["北區","西屯區","豐原區"]},
    {id:"s2",name:"陳業務",phone:"0900000002",rating:4.7,status:"online",areas:["北區","西屯區","豐原區"]},
  ],
  services:[
    {id:"sv1",name:"基礎除蟎",desc:"1 張床 + 2 個枕頭",price:2300,dur:90,base:true,addon:false,active:true},
    {id:"sv2",name:"冷氣清洗（分離式）",desc:"單台冷氣清洗",price:2500,dur:90,base:false,addon:true,active:true},
    {id:"sv3",name:"加購一個枕頭",desc:"額外清一個枕頭",price:200,dur:10,base:false,addon:true,active:true},
    {id:"sv4",name:"加購一張床",desc:"額外清一張床墊",price:1500,dur:30,base:false,addon:true,active:true},
    {id:"sv5",name:"加購沙發",desc:"單張沙發除蟎",price:1200,dur:60,base:false,addon:true,active:true},
  ],
  packages:[
    {id:"pk1",name:"基礎除蟎 8 次套組",total:8,price:16000,active:true},
    {id:"pk2",name:"基礎除蟎 16 次套組",total:16,price:30000,active:true},
  ],
  promotions:[{id:"pm1",name:"Demo 後加贈 6 次",type:"free_trial",value:6,active:true}],
  customers:[
    {id:"c1",name:"鄭家豪",phone:"0912200003",city:"台中市",dist:"北屯區",addr:"崇德路二段100號",pkgRem:11,pkgTotal:16,manual:false},
    {id:"c2",name:"吳承恩",phone:"0912200001",city:"台中市",dist:"西屯區",addr:"市政北二路380號",pkgRem:5,pkgTotal:8,manual:false},
    {id:"c3",name:"李淑芬",phone:"0912100003",city:"台中市",dist:"西屯區",addr:"台灣大道三段500號",pkgRem:0,pkgTotal:0,manual:false},
    {id:"c4",name:"周雅琪",phone:"0912100006",city:"台中市",dist:"西屯區",addr:"文心路二段88號",pkgRem:0,pkgTotal:0,manual:false},
    {id:"me",name:"",phone:"0912345678",city:"",dist:"",addr:"",pkgRem:0,pkgTotal:0,manual:false,onboarded:false,
      hasPets:false,hasBaby:false,allergy:"",notifyPush:true,notifySms:true},
  ],
  bookings:[
    {id:"b1",cust:"c3",staff:"s2",type:"demo",date:TODAY,slot:"09:00-12:00",status:"進行中"},
    {id:"b2",cust:"c4",staff:"s2",type:"demo",date:TODAY,slot:"12:00-15:00",status:"待出發"},
    {id:"b3",cust:"c1",staff:"s2",type:"package",date:"2026-06-17",slot:"15:00-18:00",status:"已完成"},
    {id:"b4",cust:"c2",staff:"s1",type:"demo",date:"2026-06-16",slot:"12:00-15:00",status:"已完成"},
    {id:"b5",cust:"c2",staff:"s2",type:"package",date:"2026-07-29",slot:"09:00-12:00",status:"已確認"},
    {id:"b6",cust:"c1",staff:"s1",type:"package",date:"2026-07-27",slot:"12:00-15:00",status:"已確認"},
  ],
  completions:[
    {bk:"b3",hours:1.5,items:{"除蟎-枕頭":2},custNote:"已加強臥室除蟎",internalNote:"長輩同住，用低敏配方",rating:5,comment:"師傅很專業，除蟎後過敏明顯改善！",fee:400,feeStatus:"待匯出",month:"2026-06",signed:true},
    {bk:"b4",hours:1.5,items:{"除蟎-枕頭":2},custNote:"",internalNote:"",rating:5,comment:"準時又仔細",fee:0,feeStatus:"-",month:"2026-06",signed:true},
  ],
  schedule:{}, scheduleSubmitted:false,
  compensations:[], logs:[
    {t:"2026-06-17 15:40",who:"陳業務",act:"完工回報",tgt:"鄭家豪 06-17 套組服務"},
  ],
};
}
let db=seed();
let st={role:null,scr:"launcher",p:{},tab:""};
const meId="me";
const me=()=>db.customers.find(c=>c.id===meId);
const cust=id=>db.customers.find(c=>c.id===id)||{name:"—"};
const stf=id=>db.staff.find(s=>s.id===id)||{name:"未指派"};
const bk=id=>db.bookings.find(b=>b.id===id);
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}
function log(act,tgt){db.logs.unshift({t:TODAY+" "+new Date().toTimeString().slice(0,5),who:st.role==="admin"?"行政人員":st.role==="staff"?"陳業務":(me().name||"客戶"),act,tgt});}

/* ---------- UI helpers ---------- */
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
function ab(title,back,right){return `<div class="ab"><div class="l">${back?`<span class="bk" onclick="A.go('${back}')">‹</span>`:""}<span>${title}</span></div>${right||""}</div>`;}
function badge(t,c){return `<span class="badge ${c}">${t}</span>`;}
function statusBadge(s){const m={"進行中":"b-blue","待出發":"b-gray","待派工":"b-gray","已確認":"b-blue","已完成":"b-ok","已取消":"b-dang","棄單":"b-dang"};return badge(s,m[s]||"b-gray");}
function tabbarC(){const t=[["home","⌂","首頁"],["myBookings","▦","我的預約"],["profile","◔","個人"]];return `<div class="tabbar">${t.map(x=>`<div class="${st.scr===x[0]?'on':''}" onclick="A.go('${x[0]}')"><span class="i">${x[1]}</span>${x[2]}</div>`).join("")}</div>`;}
function tabbarS(){const t=[["shome","▤","派工"],["schedule","▦","班表"],["serviceArea","◎","服務區"],["sme","◔","個人"]];return `<div class="tabbar">${t.map(x=>`<div class="${st.scr===x[0]?'on':''}" onclick="A.go('${x[0]}')"><span class="i">${x[1]}</span>${x[2]}</div>`).join("")}</div>`;}
function stars(n){return `<span class="stars">${"★".repeat(n)}${"☆".repeat(5-n)}</span>`;}
const SLOTS=["09:00-12:00","12:00-15:00","15:00-18:00","18:00-20:00"];

/* ---------- render ---------- */
function render(){
  ["cust","staff","admin"].forEach(r=>{const b=document.getElementById("r-"+r);if(b)b.classList.toggle("on",st.role===r);});
  const stage=document.getElementById("stage");
  if(st.scr==="launcher"||st.scr==="otp"){stage.innerHTML=`<div class="phone"><div class="scr">${SCREENS[st.scr]()}</div></div>`;return;}
  const body=(SCREENS[st.scr]||(()=>"找不到畫面"))();
  if(st.role==="admin"){
    stage.innerHTML=`<div class="browser"><div class="bbar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="url">baojay-admin-stg.vercel.app/${st.scr}</span></div><div class="scr">${body}</div></div>`;
  }else{
    const tb=st.role==="cust"?tabbarC():tabbarS();
    stage.innerHTML=`<div class="phone"><div class="scr"><div class="body">${body}</div>${tb}</div></div>`;
  }
}
const A={
  login(role){st.role=role;st.p={};
    if(role==="cust"){st.scr=me().onboarded?"home":"onboarding";}
    else if(role==="staff"){st.scr="shome";st.p.date=TODAY;}
    else{st.scr="ahome";}
    render();},
  reset(){db=seed();st={role:null,scr:"launcher",p:{},tab:""};render();toast("資料已重設");},
  go(s,p){st.scr=s;if(p)Object.assign(st.p,p);render();},
  set(k,v){st.p[k]=v;render();},
};

/* =========================================================
   SCREENS
========================================================= */
const SCREENS={};

/* ---- launcher ---- */
SCREENS.launcher=()=>`
  <div style="padding:46px 22px;text-align:center">
   <div style="width:60px;height:60px;border-radius:16px;background:var(--pri);color:#fff;font-size:27px;font-weight:700;line-height:60px;margin:0 auto">寶</div>
   <div style="font-weight:700;font-size:19px;margin-top:12px">寶傑淨化科技</div>
   <div class="muted small">可操作原型 · 選擇身份開始體驗</div></div>
  <div class="card" onclick="A.go('otp',{role:'cust'})" style="cursor:pointer"><b>客戶 App</b><div class="muted small">預約免費體驗 / 套組服務、查詢、評分</div></div>
  <div class="card" onclick="A.go('otp',{role:'staff'})" style="cursor:pointer"><b>業務 App</b><div class="muted small">今日派工、班表、完工回報、棄單</div></div>
  <div class="card" onclick="A.go('otp',{role:'admin'})" style="cursor:pointer"><b>行政後台</b><div class="muted small">調度、CRM、報表、權限、推播</div></div>
  <div class="note cen">也可用上方控制列隨時切換身份。三端共用同一份記憶體資料。</div>`;
SCREENS.otp=()=>{
  const r=st.p.role,lbl={cust:"客戶",staff:"業務",admin:"行政"}[r],ph={cust:"0912345678",staff:"0900000002",admin:"0900000003"}[r];
  return `<div style="padding:34px 18px 6px;text-align:center">
   <div style="width:54px;height:54px;border-radius:14px;background:var(--pri);color:#fff;font-size:24px;font-weight:700;line-height:54px;margin:0 auto">寶</div>
   <div style="font-weight:700;font-size:17px;margin-top:12px">寶傑淨化科技</div><div class="muted small">手機號碼登入（${lbl}）</div></div>
   <div class="card"><div class="field" style="margin:0 0 8px"><label>手機號碼</label><input class="ipt" id="otp-ph" value="${ph}"></div>
   <div class="field" style="margin:0"><label>驗證碼（測試固定 000000）</label><input class="ipt" id="otp-code" value="000000"></div></div>
   <button class="btn" onclick="A.login('${r}')">驗證並登入</button>
   <div class="note cen">測試環境不真的發簡訊，輸入 000000 即可。<br>Apple / Google 登入（即將開放）</div>`;
};

/* ===================== CUSTOMER ===================== */
SCREENS.onboarding=()=>{
  const m=me();
  return ab("新手引導")+`
  <div class="cen" style="padding:14px">👋<div style="font-weight:700">歡迎加入寶傑淨化</div><div class="muted small">請填寫基本資料，以便為您安排到府服務</div></div>
  <div class="sect">基本資料</div>
  <div class="field"><label>姓名 *</label><input class="ipt" id="ob-name" placeholder="例：陳小明" value="${esc(m.name)}"></div>
  <div class="field"><label>服務地址 *</label>
    <div class="seg" style="margin-bottom:7px">
      <select class="ipt" id="ob-city"><option value="">選擇縣市</option>${["台北市","新北市","桃園市","台中市","台南市","高雄市"].map(c=>`<option ${m.city===c?"selected":""}>${c}</option>`).join("")}</select>
      <select class="ipt" id="ob-dist"><option value="">行政區</option>${["中區","東區","南區","西區","北區","北屯區","西屯區","南屯區"].map(d=>`<option ${m.dist===d?"selected":""}>${d}</option>`).join("")}</select>
    </div>
    <input class="ipt" id="ob-addr" placeholder="例：文心路三段100號" value="${esc(m.addr)}"></div>
  <div class="sect">通知偏好</div>
  <div class="card"><div class="row"><div><b>推播通知</b><div class="muted small">App 內即時通知</div></div><div class="toggle ${m.notifyPush?"":"off"}" onclick="A.tgOb('notifyPush',this)"></div></div>
  <div class="row"><div><b>簡訊通知</b><div class="muted small">重要提醒以簡訊補發</div></div><div class="toggle ${m.notifySms?"":"off"}" onclick="A.tgOb('notifySms',this)"></div></div></div>
  <button class="btn" onclick="A.saveOnboarding()">開始使用</button>
  <div class="note">其他服務資訊（寵物、嬰幼兒等）將在預約時填寫</div>`;
};
A.tgOb=(k,el)=>{me()[k]=!me()[k];el.classList.toggle("off");};

   <button class="btn sec" onclick="A.go('abookings')">返回列表</button>`;};
A.doReassign=(bid,sid)=>{const b=bk(bid);const old=stf(b.staff).name;b.staff=sid;log("改派業務",cust(b.cust).name+"："+old+" → "+stf(sid).name);st.p.reassign=false;toast("已改派給 "+stf(sid).name+"（客戶將收到異動通知）");render();};

   <div class="card"><b style="font-size:15px">${c.name}</b>${c.manual?" "+badge("代建","b-gray"):" "+badge("自助註冊","b-blue")}<div class="muted small">${c.phone} · ${c.city}${c.dist}${esc(c.addr)}</div></div>

SCREENS.astaff=()=>aback("業務管理","ahome")+`<div class="pad"><b>業務管理</b><div class="muted small">共 ${db.staff.length} 位業務</div></div>

   <div class="muted small">區域：台中市 · ★ ${s.rating} · 完工 ${db.completions.filter(c=>bk(c.bk)&&bk(c.bk).staff===s.id).length} 場</div>

SCREENS.scheduleLocks=()=>aback("班表鎖定","ahome")+`<div class="note">預設依日期自動鎖定（BL-#011）。可對個別業務手動覆蓋。</div>

/* ---- util ---- */
function futureDates(n){const out=[];const wd=["日","一","二","三","四","五","六"];const base=new Date(TODAY+"T00:00");
  for(let i=0;i<n;i++){const d=new Date(base);d.setDate(d.getDate()+i);out.push({i,iso:d.toISOString().slice(0,10),md:(d.getMonth()+1)+"/"+d.getDate(),wd:"週"+wd[d.getDay()]});}return out;}

render();
</script>
